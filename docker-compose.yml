# Example stack: app only. Point DATABASE_URL / MQTT_URL at your TeslaMate services.
# Do not commit real credentials — use a .env file (gitignored) or your orchestrator secrets.

services:
  teslamate-frontend:
    # Pin release or sha tag from GHCR (no floating latest).
    image: ghcr.io/jmcglock/a-better-teslamate-frontend:${IMAGE_TAG:?set IMAGE_TAG e.g. 1.0.0}
    # Or build locally:
    # build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      CURRENCY: ${CURRENCY:-$}
      TZ: ${TZ:-UTC}
    restart: unless-stopped
