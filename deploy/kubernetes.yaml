# Example Kubernetes manifests. Replace secret values before apply.
# Image is public on GHCR after package visibility is set — no imagePullSecrets needed.
---
apiVersion: v1
kind: Namespace
metadata:
  name: teslamate
---
apiVersion: v1
kind: Secret
metadata:
  name: teslamate-frontend-secrets
  namespace: teslamate
type: Opaque
stringData:
  # Prefer a read-only Postgres role (see README).
  DATABASE_URL: "postgres://teslamate_ro:CHANGE_ME@teslamate-db:5432/teslamate"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-frontend
  namespace: teslamate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate-frontend
  template:
    metadata:
      labels:
        app: teslamate-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: teslamate-frontend
          # Pin release or sha tag from GHCR (immutable).
          image: ghcr.io/jmcglock/a-better-teslamate-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: MQTT_URL
              value: "mqtt://mosquitto:1883"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: teslamate-frontend-secrets
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate-frontend
  namespace: teslamate
spec:
  selector:
    app: teslamate-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
